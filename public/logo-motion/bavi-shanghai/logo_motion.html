<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>MagicJ × 巴威｜Logo Motion</title>
<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 50% 10%,#143b5b 0,#061622 52%,#02090e 100%);color:#eaf7ff;font:14px/1.5 Inter,"Microsoft YaHei",sans-serif;overflow-x:hidden}.shell{width:min(1120px,calc(100% - 32px));margin:auto;padding:30px 0 24px}.top{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;margin-bottom:20px}.eyebrow{color:#72c9ef;letter-spacing:.18em;text-transform:uppercase;font-size:11px}.title{font-size:clamp(24px,4vw,44px);line-height:1.05;margin:5px 0 0}.stamp{color:#8ba7b6;text-align:right;font-variant-numeric:tabular-nums}.stage{position:relative;min-height:520px;border:1px solid #5dcdf52b;border-radius:28px;background:linear-gradient(145deg,#0c2738d9,#06131ce8);box-shadow:0 32px 90px #0008;overflow:hidden;isolation:isolate}.stage:before{content:"";position:absolute;inset:0;background-image:linear-gradient(#62c9ef0a 1px,transparent 1px),linear-gradient(90deg,#62c9ef0a 1px,transparent 1px);background-size:32px 32px;mask-image:linear-gradient(#000,transparent 90%)}#logo-root{position:absolute;inset:0;display:grid;place-items:center;cursor:pointer}#logo-root svg{width:min(70%,700px);height:auto;overflow:visible}.data{position:absolute;left:28px;top:28px;display:grid;gap:8px}.data strong{font-size:26px}.data span,.impact span{color:#8ba7b6}.impact{position:absolute;right:28px;bottom:28px;text-align:right}.impact strong{display:block;font-size:18px;color:#f4c76a}.status{position:absolute;left:28px;bottom:28px;display:flex;align-items:center;gap:8px;color:#a9c6d6}.live{width:7px;height:7px;border-radius:50%;background:#f4c76a;box-shadow:0 0 15px #f4c76a}.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:16px 0}.btn{border:1px solid #76cae84a;background:#0b2838;color:#eaf7ff;border-radius:999px;padding:9px 15px;cursor:pointer}.btn:hover,.btn:focus-visible{border-color:#76cae8;outline:none}.range{accent-color:#f4c76a}.principles{display:flex;gap:8px;flex-wrap:wrap}.pill{padding:6px 10px;border-radius:999px;background:#0a2433;color:#7fa3b6;border:1px solid #69c5e51f}.pill.active{color:#fff;border-color:#f4c76a88;background:#59481d55}.atoms{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}.atom{min-height:116px;border:1px solid #5dcdf520;border-radius:18px;background:#071b27;display:grid;place-items:center;position:relative;overflow:hidden}.atom b{position:absolute;left:14px;top:10px;color:#7395a7;font-size:11px}.mini{width:52px;height:52px;border-radius:14px;background:linear-gradient(145deg,#1e3a5f,#86b7d8);display:grid;place-items:center;font:800 30px Georgia;color:white}.atom:hover .wind{transform:translateY(-5px) rotate(3deg);box-shadow:0 16px 30px #5dcdf52e}.wind{transition:.25s cubic-bezier(.16,1,.3,1)}.pulse{animation:pulse 1.8s ease-in-out infinite}.orbit:after{content:"";position:absolute;width:8px;height:8px;border-radius:50%;background:#f4c76a;animation:orbit 2s linear infinite}@keyframes pulse{50%{transform:scale(1.06);filter:brightness(1.18)}}@keyframes orbit{from{transform:rotate(0) translateX(40px)}to{transform:rotate(360deg) translateX(40px)}}
@media(max-width:640px){html,body{max-width:100vw;overflow-x:hidden}.shell{width:calc(100vw - 20px);max-width:calc(100vw - 20px);margin:0 10px;padding-top:14px}.top{align-items:flex-start}.stamp{font-size:10px;max-width:110px}.stage{width:calc(100vw - 20px);max-width:calc(100vw - 20px);min-height:560px;border-radius:20px}.data{left:18px;top:18px}.data strong{font-size:24px}.impact{left:auto;right:16px;bottom:58px;width:min(200px,calc(100% - 180px));max-width:200px;overflow-wrap:anywhere}.status{left:18px;bottom:18px}#logo-root svg{width:112%;transform:none}.controls{display:grid;grid-template-columns:max-content max-content;align-items:center}.controls label{grid-column:1/-1}.principles{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));width:calc(100vw - 20px)}.pill{text-align:center;min-width:0}.atoms{grid-template-columns:1fr}.atom{min-height:92px}}
@media(prefers-reduced-motion:reduce){.pulse,.orbit:after{animation:none!important}}
</style>
<style id="motion-styles">
:root{--p2m-duration:8000ms}#mark,#container,#letter-j,#accent,#weather-context,#storm-core,#shanghai-pulse{transform-box:fill-box;transform-origin:center}.is-playing #mark{animation:p2m-mark var(--p2m-duration) both}.is-playing #container{animation:p2m-container var(--p2m-duration) both}.is-playing #letter-j{animation:p2m-letter var(--p2m-duration) both}.is-playing #accent{animation:p2m-accent var(--p2m-duration) both}.is-playing #weather-context{animation:p2m-weather var(--p2m-duration) both}.is-playing #storm-path{stroke-dasharray:1 1;animation:p2m-path var(--p2m-duration) both}.is-playing #storm-core{animation:p2m-core var(--p2m-duration) both}.is-playing #shanghai-pulse{animation:p2m-shanghai var(--p2m-duration) both}@keyframes p2m-mark{0%,10%{opacity:0;transform:translateY(14px) scale(.82)}20%{opacity:.28;transform:translateY(8px) scale(.76);animation-timing-function:cubic-bezier(.34,0,.14,1)}44%{opacity:1;transform:translateY(-4px) scale(1.03);animation-timing-function:cubic-bezier(.16,1,.3,1)}62%,100%{opacity:1;transform:none}}@keyframes p2m-container{0%,16%{opacity:0;transform:rotate(-9deg) scale(.74)}45%{opacity:1;transform:rotate(1.2deg) scale(1.02);animation-timing-function:cubic-bezier(.16,1,.3,1)}62%,100%{opacity:1;transform:none}}@keyframes p2m-letter{0%,24%{opacity:0;transform:translateY(18px)}49%{opacity:1;transform:translateY(-3px);animation-timing-function:cubic-bezier(.16,1,.3,1)}64%,100%{opacity:1;transform:none}}@keyframes p2m-accent{0%,31%{opacity:0;transform:translate(-18px,12px) rotate(-24deg) scale(.6)}51%{opacity:1;transform:translate(2px,-3px) rotate(4deg) scale(1.08);animation-timing-function:cubic-bezier(.34,1.56,.64,1)}68%,100%{opacity:1;transform:none}}@keyframes p2m-weather{0%,14%{opacity:0}22%,60%{opacity:1;animation-timing-function:cubic-bezier(.4,0,.2,1)}72%,100%{opacity:0}}@keyframes p2m-path{0%,20%{stroke-dashoffset:1;opacity:0}24%{opacity:1}58%{stroke-dashoffset:0;opacity:1;animation-timing-function:cubic-bezier(.34,0,.14,1)}70%,100%{stroke-dashoffset:0;opacity:0}}@keyframes p2m-core{0%,20%{opacity:0;transform:rotate(0) scale(.4)}28%{opacity:1;transform:rotate(180deg) scale(1.35)}58%{opacity:1;transform:translate(388px,-48px) rotate(720deg) scale(.72);animation-timing-function:cubic-bezier(.34,0,.14,1)}70%,100%{opacity:0;transform:translate(388px,-48px) rotate(780deg) scale(.5)}}@keyframes p2m-shanghai{0%,52%{opacity:0;transform:scale(.2)}58%{opacity:1;transform:scale(2.2)}64%{opacity:.35;transform:scale(4.6);animation-timing-function:cubic-bezier(.16,1,.3,1)}71%,100%{opacity:0;transform:scale(5.4)}}@media(prefers-reduced-motion:reduce){#mark,#container,#letter-j,#accent{animation:none!important;opacity:1!important;transform:none!important}#weather-context{display:none}}
</style>
</head>
<body><main class="shell"><header class="top"><div><div class="eyebrow">MagicJ Weather Signal</div><h1 class="title">巴威 · 上海影响</h1></div><div class="stamp">数据快照<br>2026-07-11 01:00 CST</div></header>
<section class="stage"><div class="data"><span>台风 2609</span><strong>14级 · 42m/s</strong><span>23.5°N / 125.5°E</span></div><div id="logo-root" aria-label="点击重播动画"></div><div class="impact"><span>上海外围环流</span><strong>阵风 8–9级</strong><span>阵雨 · 局部大雨到暴雨</span></div><div class="status"><i class="live"></i>向西北移动 15–20 km/h</div></section>
<div class="controls"><button class="btn" id="replay">重播</button><button class="btn" id="slow">慢动作</button><label>速度 <input class="range" id="speed" type="range" min=".25" max="1.5" step=".05" value="1"></label></div>
<div class="principles" id="principles"><span class="pill">预备动作</span><span class="pill">舞台调度</span><span class="pill">弧线运动</span><span class="pill">缓入缓出</span><span class="pill">跟随与重叠</span><span class="pill">吸引力</span></div>
<section class="atoms"><div class="atom"><b>HOVER · 风感抬升</b><div class="mini wind">J</div></div><div class="atom"><b>PULSE · 风雨脉冲</b><div class="mini pulse">J</div></div><div class="atom orbit"><b>ORBIT · 路径环绕</b><div class="mini">J</div></div></section></main>
<script>
const svg=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img"><defs><linearGradient id="p2m-bg" x1="12" y1="8" x2="54" y2="58" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#1e3a5f"/><stop offset=".55" stop-color="#2f6fa3"/><stop offset="1" stop-color="#86b7d8"/></linearGradient><linearGradient id="p2m-shine" x1="15" y1="12" x2="48" y2="52" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#fff" stop-opacity=".78"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></linearGradient><filter id="p2m-shadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#031627" flood-opacity=".34"/></filter></defs><g id="weather-context" opacity="0"><path id="coast" d="M65 252c75-55 116-111 184-147M417 110c55 18 100 54 152 106" fill="none" stroke="#79bde8" stroke-width="2" stroke-dasharray="6 10" opacity=".55"/><path id="storm-path" d="M120 262C178 232 207 195 246 168C290 137 331 126 381 134C429 142 469 174 508 214" fill="none" stroke="#f4c76a" stroke-width="4" stroke-linecap="round" pathLength="1"/><circle id="storm-core" cx="120" cy="262" r="11" fill="none" stroke="#f4c76a" stroke-width="3"/><circle id="shanghai-pulse" cx="508" cy="214" r="7" fill="#f4c76a"/></g><g id="mark-position" transform="translate(222 82) scale(3.0625)" filter="url(#p2m-shadow)"><g id="mark"><rect id="container" width="64" height="64" rx="16" fill="url(#p2m-bg)"/><path id="shine" d="M14 14c8-5 24-6 36 1" fill="none" stroke="url(#p2m-shine)" stroke-width="5" stroke-linecap="round"/><path id="letter-j" d="M39 15v26c0 8.1-5.8 13.2-14.3 13.2-5.1 0-9.4-1.9-12.2-5.2l5.2-6.4c1.9 2.1 4 3.2 6.6 3.2 4.1 0 6.4-2.3 6.4-6.6V23H22v-8h17z" fill="#fff"/><g id="accent"><circle id="accent-dot" cx="47" cy="20" r="3.2" fill="#f4c76a"/><circle id="accent-spark" cx="51" cy="30" r="2" fill="#fff" opacity=".9"/><path id="accent-link" d="M47 20l4 10" stroke="#f4c76a" stroke-width="1.8" stroke-linecap="round"/></g></g></g></svg>`;
const root=document.querySelector('#logo-root'),params=new URLSearchParams(location.search),duration=8000;root.innerHTML=svg;root.querySelector('#mark-position').removeAttribute('filter');
init();
function allAnimations(){return root.getAnimations({subtree:true})}function setRate(rate){allAnimations().forEach(a=>a.playbackRate=rate)}
function setFinal(){root.classList.remove('is-playing');root.querySelector('#weather-context').style.opacity=0;root.querySelectorAll('#mark,#container,#letter-j,#accent').forEach(e=>{e.style.opacity=1;e.style.transform='none'})}
function replay(){root.classList.remove('is-playing');void root.offsetWidth;root.classList.add('is-playing');setTimeout(()=>setRate(+speed.value),0);pills()}
function seek(ms){replay();requestAnimationFrame(()=>{allAnimations().forEach(a=>{a.pause();a.currentTime=Math.min(ms,duration)});window.__p2mReady=true})}
function pills(){document.querySelectorAll('.pill').forEach((p,i)=>{p.classList.remove('active');setTimeout(()=>p.classList.add('active'),350+i*430);setTimeout(()=>p.classList.remove('active'),2500+i*430)})}
function init(){if(params.get('static')==='1')setFinal();else if(params.has('t'))seek(+params.get('t'));else replay();window.__p2mReady=true}
const replayButton=document.querySelector('#replay'),slowButton=document.querySelector('#slow'),speed=document.querySelector('#speed');replayButton.onclick=replay;root.onclick=replay;slowButton.onclick=()=>{speed.value=speed.value==='0.25'?'1':'0.25';setRate(+speed.value)};speed.oninput=()=>setRate(+speed.value);
if(matchMedia('(prefers-reduced-motion:reduce)').matches)setFinal();
</script></body></html>
